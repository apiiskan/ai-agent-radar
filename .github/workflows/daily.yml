name: AI Agent Radar Daily
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: Send a private Telegram connectivity test only
        required: false
        type: boolean
        default: false
permissions:
  contents: write
  issues: write
concurrency:
  group: ai-agent-radar-daily
  cancel-in-progress: true
jobs:
  telegram-test:
    if: github.event_name == 'workflow_dispatch' && inputs.telegram_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install .
      - name: Send Telegram connectivity test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: ai-agent-radar telegram-test
  radar:
    if: github.event_name != 'workflow_dispatch' || !inputs.telegram_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install .
      - name: Generate daily report
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
          MODEL_BASE_URL: ${{ vars.MODEL_BASE_URL }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
        run: |
          set +e
          ai-agent-radar daily
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Commit generated data only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "chore: update daily radar"
          git push
      - name: Publish durable report
        if: steps.generate.outputs.exit_code == '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ai-agent-radar publish daily
      - name: Send Telegram daily report
        if: steps.generate.outputs.exit_code == '0' && success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ai-agent-radar notify daily
      - name: Send Telegram failure alert
        if: always() && (steps.generate.outputs.exit_code != '0' || failure())
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GENERATION_EXIT_CODE: ${{ steps.generate.outputs.exit_code }}
        run: |
          args=()
          if [ -n "$GENERATION_EXIT_CODE" ]; then
            args+=(--generation-exit-code "$GENERATION_EXIT_CODE")
          fi
          ai-agent-radar notify failure "${args[@]}"
      - name: Propagate generation status
        if: always() && steps.generate.outputs.exit_code != '0'
        run: exit ${{ steps.generate.outputs.exit_code }}
